name: Build LaTeX Document

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          docker_image: crazydiamond75/latex-with-fonts:latest
          root_file: hpc_summary.tex
          latexmk_use_lualatex: true

      # May deploy to GitHub pages after this.

