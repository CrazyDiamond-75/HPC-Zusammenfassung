name: Build LaTeX Document

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      

      # TODO: Maybe do this manually with `run latexmk ...`
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          docker_image: crazydiamond75/latex-with-fonts:latest
          root_file: hpc_summary.tex
          latexmk_use_lualatex: true
      
      #- name: Upload PDF
      #  uses: actions/upload-artifact@v6
      #  with:
      #    name: Generated PDF
      #    path: hpc_summary.pdf
      
      - name: Upload PDF
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
